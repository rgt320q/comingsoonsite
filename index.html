<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Başlıyoruz! - Şirket Adınız</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS Değişkenleri (Renk Paleti ve Ana Ayarlar) */
        :root {
            --primary-color: #e60023; /* Canlı ve enerjik bir kırmızı */
            --dark-bg: #121212; /* Tam siyah yerine koyu, modern bir arka plan */
            --light-bg: #1d1d1d; /* İç kutu için biraz daha açık ton */
            --text-light: #f5f5f5; /* Ana metin rengi */
            --text-medium: #a0a0a0; /* İkincil metin rengi */
            --border-color: #333333;
        }

        /* Genel Resetleme ve Temel Ayarlar */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px; /* rem biriminin temelini oluşturur */
        }

        body {
            font-family: 'Poppins', sans-serif; /* Modern ve popüler bir font */
            background-color: var(--dark-bg);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem; /* Kenarlarda boşluk bırakarak içeriğin yapışmasını engeller */
        }

        /* Ana İçerik Konteyneri */
        .container {
            background-color: var(--light-bg);
            border: 1px solid var(--border-color);
            padding: clamp(2rem, 6vw, 4rem); /* Ekran boyutuna göre esnek iç boşluk */
            border-radius: 10px;
            max-width: 700px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(230, 0, 35, 0.25); /* Kırmızı parlama efekti */
            border-bottom: 6px solid var(--primary-color);
            transform: translateY(0);
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }
        .container:hover {
            transform: translateY(-5px); /* Hafif yukarı kalkma efekti */
            box-shadow: 0 10px 80px rgba(230, 0, 35, 0.35);
        }

        /* Şirket Logosu */
        .logo {
            max-width: clamp(150px, 25vw, 180px); /* Ekran boyutuna göre esnek logo boyutu */
            margin-bottom: 2.5rem;
        }

        /* Ana Başlık (Fluid Typography) */
        h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: clamp(2.5rem, 8vw, 4rem); 
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        /* Açıklama Metni */
        p.message {
            font-weight: 300;
            color: var(--text-light);
            font-size: clamp(1rem, 2.5vw, 1.15rem); 
            line-height: 1.7;
            max-width: 550px;
            margin: 0 auto 2.5rem auto;
        }
        
        /* --- YENİ ANİMASYONLU İLERLEME ÇUBUĞU --- */

        /* 1. İlerleme Çubuğu Konteyneri (Eski .countdown-area'nın yerini aldı) */
        .progress-container {
            position: relative; /* İçerideki elemanları konumlandırmak için */
            font-family: 'Roboto Mono', monospace;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: var(--dark-bg);
            margin-bottom: 2.5rem;
            overflow: hidden; /* Dışarı taşan animasyonu gizler */
            padding: 1rem;
        }
        
        /* 2. Doldurma Efekti Yapan Çubuk */
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%; /* Animasyonla %100 olacak */
            background-color: var(--primary-color);
            border-radius: 5px;
            animation: fillProgress 20s ease-in-out infinite; /* Animasyonu uygula */
        }
        
        /* 3. İlerleme Çubuğunun Üzerindeki Metin */
        .progress-text {
            position: relative; /* Akışta kalır ve çubuğun üzerinde görünür */
            z-index: 10; /* Her zaman en üstte olmasını sağlar */
            color: #fff;
            /* Bu mod, alttaki renge göre rengini tersine çevirir. 
               Kırmızı çubuk geçtiğinde yazı siyaha döner, çok şık bir efekt! */
            mix-blend-mode: difference; 
            letter-spacing: 2px;
            font-size: clamp(1rem, 4vw, 1.25rem);
        }

        /* 4. Animasyonun Kendisi (Keyframes) */
        @keyframes fillProgress {
            0% {
                width: 0%;
            }
            100% {
                width: 100%;
            }
        }
        
        /* --- ANİMASYON BÖLÜMÜ SONU --- */

        /* İletişim Bilgileri */
        .info-area {
            border-top: 1px solid var(--border-color);
            padding-top: 2rem;
        }

        .info-area p {
            margin-bottom: 0.8rem;
            color: var(--text-medium);
        }

        .info-area a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        .info-area a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }
        
        /* Alt Bilgi (Footer) */
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-medium);
            opacity: 0.7;
        }

        /* Mobil Cihazlar için Özel Ayarlamalar */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            h1 {
                letter-spacing: 1px;
            }
            .container {
                padding: clamp(1.5rem, 5vw, 2rem);
            }
        }
    </style>
</head>
<body>
    
    <div class="container">
        
        <a class="underline" href="https://github.com/rgt320q">
        <img src="logo.png" alt="Şirket Logosu" class="logo">
        </a>

        <h1>Geliştiriliyor!</h1>

        <p class="message">
            Yenilikçi fikirler ve tutkuyla çıktığımız bu yolda, dijital dünyada iz bırakmaya geliyoruz.
            Hazır olun, çok yakında karşınızdayız!
        </p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
            <span class="progress-text">YÜKLENİYOR...</span>
        </div>

        <div class="info-area">
            <p>Gelişmelerden haberdar olmak için:</p>
            <p><a href="mailto:iletisim@sirketadiniz.com">cetin.omer@outlook.com.tr</a></p>
        </div>

        <div class="footer">
            &copy; <span id="current-year"></span> mrCetin. Tüm Hakları Saklıdır.
        </div>
        
    </div>
    

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>

</body>
</html>
